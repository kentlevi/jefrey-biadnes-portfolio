<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2d1bc" />
      <stop offset="50%" stop-color="#d4b998" />
      <stop offset="100%" stop-color="#bca280" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background subtle dotted track -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#gold-grad)" stroke-width="0.75" stroke-dasharray="2 2" opacity="0.4" />
  
  <!-- Connection Lines -->
  <line x1="16" y1="6" x2="7" y2="21" stroke="url(#gold-grad)" stroke-width="1.25" opacity="0.8" />
  <line x1="16" y1="6" x2="25" y2="21" stroke="url(#gold-grad)" stroke-width="1.25" opacity="0.8" />
  <line x1="7" y1="21" x2="25" y2="21" stroke="url(#gold-grad)" stroke-width="1.25" opacity="0.8" />
  
  <!-- Central Hub (Core Backend) -->
  <circle cx="16" cy="15" r="4.5" fill="url(#gold-grad)" filter="url(#glow)" />
  
  <!-- Inner hubs -->
  <circle cx="16" cy="15" r="2" fill="#070708" />

  <!-- Outer Node circles (Integration endpoints) -->
  <!-- Top Node -->
  <circle cx="16" cy="6" r="2.5" fill="#070708" stroke="url(#gold-grad)" stroke-width="1.5" />
  <!-- Bottom Left Node -->
  <circle cx="7" cy="21" r="2.5" fill="#070708" stroke="url(#gold-grad)" stroke-width="1.5" />
  <!-- Bottom Right Node -->
  <circle cx="25" cy="21" r="2.5" fill="#070708" stroke="url(#gold-grad)" stroke-width="1.5" />
</svg>
